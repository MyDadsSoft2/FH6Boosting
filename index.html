<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyDadsSoft's Boosting</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: radial-gradient(circle at top, #1a0000, #000);
  color: white;
  overflow-x: hidden;
}

/* animated glow background */
.bg-glow {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 20%, rgba(255,0,0,0.2), transparent 40%),
              radial-gradient(circle at 80% 80%, rgba(255,0,0,0.15), transparent 40%);
  filter: blur(40px);
  z-index: 0;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
}

nav h1 {
  color: #ff2b2b;
  font-weight: 900;
  letter-spacing: 2px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 60px;
  position: relative;
  z-index: 1;
}

.hero h2 {
  font-size: 64px;
  font-weight: 900;
}

.hero span {
  color: #ff2b2b;
  text-shadow: 0 0 25px red;
}

.hero p {
  margin-top: 15px;
  color: rgba(255,255,255,0.6);
}

/* BUTTONS */
.btn {
  margin-top: 20px;
  padding: 14px 26px;
  border: none;
  border-radius: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: translateY(-3px);
}

.red {
  background: #ff2b2b;
  color: white;
  box-shadow: 0 0 30px rgba(255,0,0,0.4);
}

.dark {
  background: rgba(255,255,255,0.05);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}

/* LOCKED STATE */
.locked {
  opacity: 0.5;
  pointer-events: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  max-width: 1000px;
  margin: auto;
  padding: 60px 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 25px;
  transition: 0.2s;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-6px);
  border-color: rgba(255,0,0,0.5);
}

.price {
  font-size: 28px;
  color: #ff2b2b;
  font-weight: 900;
  margin: 10px 0;
}

/* ORDER */
.order {
  text-align: center;
  padding: 60px 20px;
  position: relative;
  z-index: 1;
}

input, select {
  width: 280px;
  padding: 12px;
  margin: 10px auto;
  display: block;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

.notice {
  color: rgba(255,255,255,0.6);
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<nav>
  <h1>MyDadsSoft</h1>
  <button class="btn dark" onclick="joinDiscord()">Join Discord</button>
</nav>

<div class="hero">
  <h2>FH6 <span>BOOSTING</span></h2>
  <p>Credits • Wheelspins • Rare Cars</p>

  <button class="btn red" onclick="scrollOrder()">Start Order</button>
</div>

<div class="grid">

  <div class="card">
    <h3>Credits</h3>
    <div class="price">£5 - £50</div>
    <p>100M / 500M / 999M packages</p>
  </div>

  <div class="card">
    <h3>Wheelspins</h3>
    <div class="price">£3 - £25</div>
    <p>50 / 200 / 1000 spins</p>
  </div>

  <div class="card">
    <h3>Rare Cars</h3>
    <div class="price">Custom</div>
    <p>Exclusive vehicle requests</p>
  </div>

</div>

<div class="order" id="order">

  <h2>Place Order</h2>

  <p class="notice">⚠ You must join the Discord to place an order</p>

  <input id="discord" placeholder="Discord Username">

  <select id="product" class="locked">
    <option>Credits</option>
    <option>Wheelspins</option>
    <option>Rare Cars</option>
  </select>

  <input id="amount" placeholder="Amount">

  <button id="orderBtn" class="btn red locked" onclick="submitOrder()">
    Submit Order
  </button>

</div>

<script>
let joined = false;

function joinDiscord(){
  window.open("https://discord.gg/YOURINVITE", "_blank");
  joined = true;

  document.getElementById("orderBtn").classList.remove("locked");
  document.getElementById("product").classList.remove("locked");

  alert("Discord opened — you can now place an order.");
}

function scrollOrder(){
  document.getElementById("order").scrollIntoView({behavior:"smooth"});
}

function submitOrder(){
  if(!joined){
    alert("You must join the Discord first!");
    return;
  }

  alert("Order sent successfully!");
}
</script>

</body>
</html>
