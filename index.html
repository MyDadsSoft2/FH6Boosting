<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyDadsSoft's Boosting</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000);
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND GLOW */
.glow {
  position: fixed;
  width: 600px;
  height: 600px;
  background: rgba(255,0,0,0.15);
  filter: blur(120px);
  border-radius: 50%;
  z-index: 0;
}

.glow.one { top: -200px; left: -200px; }
.glow.two { bottom: -200px; right: -200px; }

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
  z-index: 10;
}

nav h1 {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #ff2b2b;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 60px;
}

.hero h2 {
  font-size: 60px;
  font-weight: 900;
}

.hero span {
  color: #ff2b2b;
  text-shadow: 0 0 20px red;
}

.hero p {
  margin-top: 15px;
  color: rgba(255,255,255,0.6);
  font-size: 18px;
}

/* BUTTONS */
.btn {
  margin-top: 25px;
  padding: 14px 26px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  transition: 0.2s;
}

.btn-red {
  background: #ff2b2b;
  color: white;
  box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.btn-red:hover {
  transform: translateY(-3px);
}

.btn-dark {
  background: rgba(255,255,255,0.05);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}

.btn-dark:hover {
  transform: translateY(-3px);
}

/* PRICING */
section {
  padding: 80px 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 25px;
  backdrop-filter: blur(10px);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: rgba(255,0,0,0.5);
}

.card h3 {
  font-size: 22px;
  margin-bottom: 10px;
}

.price {
  font-size: 32px;
  color: #ff2b2b;
  font-weight: 900;
  margin: 10px 0;
}

/* ORDER */
.order {
  text-align: center;
}

input, select {
  width: 280px;
  padding: 12px;
  margin: 10px auto;
  display: block;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* MOBILE */
@media(max-width: 600px){
  .hero h2 { font-size: 38px; }
}
</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<nav>
  <h1>MyDadsSoft</h1>
</nav>

<div class="hero">
  <h2>FH6 <span>BOOSTING</span></h2>
  <p>Credits • Wheelspins • Rare Cars</p>

  <button class="btn btn-red" onclick="scrollToOrder()">Order Now</button>
</div>

<section>
  <div class="grid">

    <div class="card">
      <h3>Credits</h3>
      <div class="price">£5 - £50</div>
      <p>100M → 999M Credit packages</p>
    </div>

    <div class="card">
      <h3>Wheelspins</h3>
      <div class="price">£3 - £25</div>
      <p>50 / 200 / 1000 spins</p>
    </div>

    <div class="card">
      <h3>Rare Cars</h3>
      <div class="price">Custom</div>
      <p>Exclusive vehicle requests</p>
    </div>

  </div>
</section>

<section class="order" id="order">

  <h2>Place Order</h2>

  <input id="discord" placeholder="Discord Username">
  
  <select id="product">
    <option>Credits</option>
    <option>Wheelspins</option>
    <option>Rare Cars</option>
  </select>

  <input id="amount" placeholder="Amount">

  <button class="btn btn-red" onclick="submitOrder()">Submit Order</button>

</section>

<script>
function scrollToOrder(){
  document.getElementById("order").scrollIntoView({behavior:"smooth"});
}

function submitOrder(){
  alert("Order sent!");
}
</script>

</body>
</html>
